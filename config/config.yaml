# ============================================
# A股量化选股系统 - 主配置文件
# ============================================
# 注意：此文件包含敏感信息时不应提交到Git仓库
# 请从 config.yaml.template 复制并填入你的配置

data_dir: data

dingtalk:
  enabled: false
  webhook_url: ""
  secret: ""

data_source:
  default_provider: "akshare"
  akshare:
    allow_mock_data: false
  tushare:
    token: ""  # 本机默认 Token 放在 config/config_local.yaml（已忽略）

web:
  host: "127.0.0.1"
  port: 5080
  auto_port: true
  allow_lan: false

schedule:
  time: "17:00"

update:
  lookback_days: 10
  skip_failed: true
